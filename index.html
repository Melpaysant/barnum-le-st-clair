
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barnum Le St Clair</title>
<link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>

<div id="products" class="grid"></div>

<div id="ticket" class="ticket-box"></div>

<div class="total-box">
    TOTAL : <span id="total">0.00</span> €
</div>

<div class="payment-buttons">

    <button id="btnCash"
            class="payment-btn active"
            onclick="setPayment('Espèces')">
        Espèces
    </button>

    <button id="btnCard"
            class="payment-btn"
            onclick="setPayment('Carte')">
        Carte
    </button>

    <button id="btnShared"
            class="payment-btn"
            onclick="setPayment('Partagé')">
        Partagé
    </button>

</div>

<input type="hidden" id="payment" value="Espèces">

<div id="sharedPayment" style="display:none; margin-top:10px;">

    <label>Montant en espèces</label>

    <input
        id="cashAmount"
        type="number"
        step="0.01"
        placeholder="0,00"
        oninput="calculateShared()">

    <label>Montant en carte</label>

    <input
        id="cardAmount"
        type="text"
        readonly>

</div>


<input id="received" type="number" placeholder="Montant reçu">
<div class="change-box">
    RENDU : <span id="change">0.00</span> €
</div>

<button class="validate-btn" onclick="saveSale()">
    ENCAISSER
</button>
<button class="cancel-line-btn" onclick="removeLastItem()">
    ANNULER DERNIÈRE SAISIE
</button>

<hr>

<button onclick="adminLogin()">Administration</button>
<button onclick="showStats()">Statistiques</button>
<button onclick="resetProducts()">Réinitialiser les produits</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="resetSales()">Réinitialiser les ventes</button>
  
<div id="output"></div>

<script src="js/app.js?v=13"></script>
</body>
</html>
