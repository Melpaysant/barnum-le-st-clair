
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barnum Le St Clair</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="products" class="grid"></div>

<div id="ticket" class="ticket-box"></div>

<div class="total-box">
    TOTAL : <span id="total">0.00</span> €
</div>

<select id="payment">
<option>Espèces</option>
<option>Carte</option>
</select>

<input id="received" type="number" placeholder="Montant reçu">
<div class="change-box">
    RENDU : <span id="change">0.00</span> €
</div>

<button class="validate-btn" onclick="saveSale()">
    ENCAISSER
</button>
<button class="clear-btn" onclick="clearTicket()">
    VIDER TICKET
</button>

<hr>

<button onclick="adminLogin()">Administration</button>
<button onclick="showStats()">Statistiques</button>
<button onclick="resetProducts()">Réinitialiser les produits</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="resetSales()">Réinitialiser les ventes</button>
  
<div id="output"></div>

<script src="js/app.js?v=10"></script>
</body>
</html>
